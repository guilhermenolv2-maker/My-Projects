<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media-queries.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
     <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Faça seu <span style="color: #336dff">login</span></h1>
                <p>Entre com suas credenciais para continuar</p>
                <form action="login.php" method="post">
                    <label for="ilogin">E-mail</label>
                    <div class="campo">
                        <i class="bi bi-envelope"></i>
                        <input type="email" name="login" id="ilogin" placeholder="Digite seu e-mail" autocomplete="email" required maxlength="30">
                    </div>
                    <label for="isenha">Senha</label>
                    <div class="campo">
                        <i class="bi bi-lock"></i>
                        <input type="password" name="senha"  id="isenha" placeholder="Digite sua senha" autocomplete="current-password" required minlength="8" maxlength="20">
                    </div>
                    <a class="esq-senha" href="">Esqueceu a senha?</a>
                    <input type="submit" value="Entrar">
                 <div class="divisor">
                <p class="ou-continue-com">ou continue com</p>
                </div>
                <div class="social-buttons">
                    <button type="button" class="google-btn" onclick="alert('Funcionalidade em desenvolvimento')">
                        <img src="imagens/botao-google.png" alt="">
                        Google
                    </button>
                     <button type="button" class="github-btn" onclick="alert('Funcionalidade em desenvolvimento')">
                        <i class="bi bi-github"></i>
                        <span>GitHub</span>
                    </button>
                </div>
                <p class="criar-conta">Não tem uma conta?<a href="#"> Cadastre-se</a></p>
                </form>
                
               
            </div>
        </section>

     </main>
</body>
</html>
