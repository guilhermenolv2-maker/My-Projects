<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Minha Lista de Tarefas</h1>

        <div class="input-area">
            <input type="text" id="tarefaInput" placeholder="Digite uma tarefa">
            <button id="btnAdicionar">Adicionar</button>
        </div>

        <div class="filtros">
            <button class="filtro ativo" data-filtro="todas">Todas</button>
            <button class="filtro" data-filtro="pendentes">Pendentes</button>
            <button class="filtro" data-filtro="concluidas">Concluídas</button>
        </div>

        <ul id="listaTarefas"></ul>

        <div class="rodape">
            <span>Total: <strong id="total">0</strong></span>
            <span>Concluídas: <strong id="concluidas">0</strong></span>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
